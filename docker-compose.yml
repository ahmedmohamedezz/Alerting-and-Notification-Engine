services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: notify_app
      POSTGRES_USER: notify
      POSTGRES_PASSWORD: notify
    ports:
      # allow access from `localhost:5432`
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data/notify

volumes:
  postgres_data:
