services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: notify_app
      POSTGRES_USER: notify
      POSTGRES_PASSWORD: notify
    ports:
      # allow access from `localhost:5433`
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
