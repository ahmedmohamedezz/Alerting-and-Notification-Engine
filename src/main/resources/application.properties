spring.application.name=notifiy

# =========================================
# DB Connection Setup
# =========================================
# Use a variable for the URL.
# Inside Docker, DB_URL will be 'jdbc:postgresql://postgres:5432/notify_app'
# Defaulting to localhost:5433 for local dev if the variable is missing.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/notify_app}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:notify}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:notify}

# =========================================
# Hibernate / Flyway
# =========================================
spring.jpa.hibernate.ddl-auto=validate

# =========================================
# JWT Security (Externalized to Environment)
# =========================================
# We use the ${VAR_NAME:default} syntax.
# Note: Remove underscores from numbers as they can cause parsing issues in properties files.
jwt.access.key=${JWT_ACCESS_KEY:default_secret_for_dev_only_change_in_production}
jwt.refresh.key=${JWT_REFRESH_KEY:default_secret_for_dev_only_change_in_production}

# Expirations
jwt.expiration.access.ms=${JWT_EXPIRATION_ACCESS_MS:300000}
jwt.expiration.refresh.ms=${JWT_EXPIRATION_REFRESH_MS:2592000000}